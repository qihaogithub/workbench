name: check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check-all:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:all
      - run: pnpm lint:all
