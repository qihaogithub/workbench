server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/screenshots/ {
        proxy_pass http://author-site:3200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires off;
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location = /data/projects.json {
        alias /app/data/published/projects-index.json;
        expires off;
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin *;
    }

    location ~* ^/data/(.*\.(?:html|json))$ {
        alias /app/data/published/$1;
        expires off;
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin *;
    }

    location /data/ {
        alias /app/data/published/;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header Access-Control-Allow-Origin *;
    }

    location ~* ^/data/(.*?/demos/.*\.js)$ {
        alias /app/data/published/$1;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
    }

    location /_next/static/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
