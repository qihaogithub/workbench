<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>笔画拼字 - 玩法介绍</title>
  <link rel="stylesheet" href="prototype.css">
</head>
<body>
  <div class="page">
    <!-- 水墨装饰 -->
    <div class="bg-ink bg-ink-1"></div>
    <div class="bg-ink bg-ink-2"></div>

    <!-- 顶部品牌 -->
    <div class="brand">
      <span class="brand-icon">🐔</span>
      <span class="brand-name">叫叫</span>
    </div>

    <!-- 标题区 -->
    <div class="title-block">
      <div class="game-icon">🧩</div>
      <h1 class="title-main">笔画拼字</h1>
      <p class="title-sub">把散落笔画 · 拼成正确汉字</p>
    </div>

    <!-- 玩法说明 -->
    <div class="rules-card">
      <div class="rules-header">📖 玩法说明</div>
      <div class="rules-list">
        <div class="rule-item">
          <span class="rule-num">1</span>
          <span class="rule-text">根据提示，猜出目标汉字</span>
        </div>
        <div class="rule-item">
          <span class="rule-num">2</span>
          <span class="rule-text">从下方笔画池选择笔画</span>
        </div>
        <div class="rule-item">
          <span class="rule-num">3</span>
          <span class="rule-text">拖入田字格拼出正确汉字</span>
        </div>
        <div class="rule-item">
          <span class="rule-num">4</span>
          <span class="rule-text">限时完成，拼错可撤销重试</span>
        </div>
      </div>
    </div>

    <!-- 示例展示 -->
    <div class="demo-area">
      <div class="demo-label">示例</div>
      <div class="demo-grid">
        <div class="demo-tian">
          <div class="tian-line h"></div>
          <div class="tian-line v"></div>
          <span class="demo-word">马</span>
        </div>
        <div class="demo-arrow">→</div>
        <div class="demo-strokes">
          <div class="mini-stroke heng-zhe"></div>
          <div class="mini-stroke shu-gou"></div>
          <div class="mini-stroke heng"></div>
        </div>
      </div>
    </div>

    <!-- 关卡信息 -->
    <div class="info-row">
      <div class="info-item">
        <span class="info-icon">🎯</span>
        <span>共 5 关</span>
      </div>
      <div class="info-item">
        <span class="info-icon">⏱</span>
        <span>每关限时 30 秒</span>
      </div>
    </div>

    <!-- 开始按钮 -->
    <button class="btn-start">
      <span class="btn-text">开始拼字</span>
      <span class="btn-arrow">→</span>
    </button>

    <!-- 底部 -->
    <div class="footer-info">
      <p>叫叫 × 汉字大冒险</p>
    </div>
  </div>
</body>
</html>
