<main class="wc-page is-dim">
  <img class="hero-title" src="../../assets/football/home/hero-title-figma.webp" alt="叫叫阅读足球季，为球队助威">
  <section class="form-sheet" aria-label="收货地址">
    <button class="sheet-close" aria-label="关闭"></button>
    <h1>收货地址</h1>
    <div class="form-note"><strong>足球冠军叫叫公仔</strong><br>请填写真实有效地址，工作人员将在活动结束后安排寄送。</div>
    <div class="field"><label>收件人姓名</label><span class="input">请输入姓名</span></div>
    <div class="field"><label>收件人电话</label><span class="input">11 位手机号</span></div>
    <div class="field"><label>省 / 市 / 区</label><div class="select-row"><span>请选择</span><span>请选择</span><span>请选择</span></div></div>
    <div class="field"><label>详细地址</label><span class="textarea">街道、小区、门牌号</span></div>
    <button class="yellow-btn">提交地址</button>
  </section>
</main>
