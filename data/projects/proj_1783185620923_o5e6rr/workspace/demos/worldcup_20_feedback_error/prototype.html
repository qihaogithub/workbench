<main class="wc-page is-dim">
  <img class="hero-title" src="../../assets/football/home/hero-title-figma.webp" alt="叫叫阅读足球季，为球队助威">
  <section class="form-sheet feedback-sheet" aria-label="意见反馈">
    <button class="sheet-close" aria-label="关闭"></button>
    <h1>意见反馈</h1>
    <div class="feedback-note">想说的话都可以留在这里</div>
    <div class="field"><label>反馈内容</label><span class="textarea"></span></div>
    <div class="field"><label>联系方式（选填）</label><span class="input">手机号 / 微信 / 其他联系方式</span></div>
    <button class="yellow-btn">提交留言</button>
    <div class="error-tip">再多写一点，我们才能看到你的想法</div>
    
  </section>
</main>
