<main class="worldcup-page is-voted" aria-label="世界杯活动进行中已投票待抽奖首页">
  <header class="topbar">
    <button class="topbar-icon-btn" aria-label="返回"><img src="../../assets/football/nav-back.svg" alt=""></button>
    <div class="topbar-actions">
      <button class="topbar-icon-btn" aria-label="分享"><img src="../../assets/football/nav-share.svg" alt=""></button>
      <button class="topbar-rule-btn" type="button">规则</button>
    </div>
  </header>

  <section class="hero" aria-label="活动主视觉">
    <div class="confetti" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <img class="hero-title-art" src="../../assets/football/home/hero-title-figma.webp" alt="叫叫阅读足球季，为球队助威，赢冠军装扮和限定公仔">
    <p class="phase-strip">今日已为 <strong>巴西</strong> 助威，冠军将于 <strong>7月20日</strong> 产生</p>
  </section>

  <section class="task-card" aria-labelledby="task-title">
    <div class="task-card-head">
      <div class="avatar-ring" aria-hidden="true"><span class="avatar-silhouette"></span></div>
      <div class="task-user-info">
        <span>今日已助威</span>
        <h1 id="task-title">巴西球迷</h1>
      </div>
      <button class="task-prize-entry" type="button" aria-label="我的奖品，当前0个">
        <img src="../../assets/football/home/reward-icon-8bc933.webp" alt="">
        <span>我的奖品</span>
        <strong>0</strong>
      </button>
    </div>

    <div class="task-panel" aria-label="任务状态">
      <img class="task-clip" src="../../assets/football/home/passport-clip-figma.webp" alt="">
      <ol class="task-list">
        <li class="task-item is-on">
          <img src="../../assets/football/home/task-icon-vote-3971d0.webp" alt="">
          <div><strong>每日助威投票</strong><span>已完成</span></div>
          <em></em>
        </li>
        <li class="task-item is-off">
          <img src="../../assets/football/home/task-icon-draw-743366.webp" alt="">
          <div><strong>每日扭蛋机抽奖</strong><span>已获得 1 次抽奖机会</span></div>
          <em></em>
        </li>
        <li class="task-item is-off">
          <img src="../../assets/football/home/task-icon-study-c28f7c.webp" alt="">
          <div><strong>累计完成学习</strong><span><b>2/10</b> 达标后有机会获得<br><u>叫叫冠军皮肤装扮</u></span></div>
          <em></em>
        </li>
      </ol>
      <div class="supported-team"><img src="../../assets/football/Team_profile_picture/巴西.webp" alt=""><div><strong>已支持巴西</strong><span>今日助威已计入球队人气</span></div></div>
      <button class="task-primary-action" type="button">去扭蛋抽奖</button>
    </div>
  </section>

  <section class="teams-section" aria-labelledby="teams-title">
    <img id="teams-title" class="section-title-art" src="../../assets/football/home/team-vote-title-figma.webp" alt="为你喜欢的球队助威，选择支持的球队，为ta贡献人气">
    <div class="team-grid">
        <button class="team-card is-supported" aria-label="查看巴西球队详情" data-team="brazil">
          <span class="team-avatar" style="--team-from:#009c3b;--team-to:#ffdf00">
            <img src="../../assets/football/Team_profile_picture/巴西.webp" alt="巴西桑巴魔术师">
          </span>
          <span class="team-name">巴西</span>
          <span class="team-role">12.8万人助威</span>
        </button>
        <button class="team-card" aria-label="查看阿根廷球队详情" data-team="argentina">
          <span class="team-avatar" style="--team-from:#75aadb;--team-to:#ffffff">
            <img src="../../assets/football/Team_profile_picture/阿根廷.webp" alt="阿根廷潘帕斯精灵">
          </span>
          <span class="team-name">阿根廷</span>
          <span class="team-role">10.6万人助威</span>
        </button>
        <button class="team-card" aria-label="查看法国球队详情" data-team="france">
          <span class="team-avatar" style="--team-from:#0055a4;--team-to:#ef4135">
            <img src="../../assets/football/Team_profile_picture/法国.webp" alt="法国高卢闪电">
          </span>
          <span class="team-name">法国</span>
          <span class="team-role">9.8万人助威</span>
        </button>
        <button class="team-card" aria-label="查看英格兰球队详情" data-team="england">
          <span class="team-avatar" style="--team-from:#cf142b;--team-to:#ffffff">
            <img src="../../assets/football/Team_profile_picture/英格兰.webp" alt="英格兰三狮前腰">
          </span>
          <span class="team-name">英格兰</span>
          <span class="team-role">8.7万人助威</span>
        </button>
        <button class="team-card" aria-label="查看葡萄牙球队详情" data-team="portugal">
          <span class="team-avatar" style="--team-from:#006600;--team-to:#ff0000">
            <img src="../../assets/football/Team_profile_picture/葡萄牙.webp" alt="葡萄牙航海家射手">
          </span>
          <span class="team-name">葡萄牙</span>
          <span class="team-role">8.2万人助威</span>
        </button>
        <button class="team-card" aria-label="查看德国球队详情" data-team="germany">
          <span class="team-avatar" style="--team-from:#000000;--team-to:#dd0000">
            <img src="../../assets/football/Team_profile_picture/德国.webp" alt="德国精密发动机">
          </span>
          <span class="team-name">德国</span>
          <span class="team-role">7.9万人助威</span>
        </button>
        <button class="team-card" aria-label="查看西班牙球队详情" data-team="spain">
          <span class="team-avatar" style="--team-from:#aa151b;--team-to:#f1bf00">
            <img src="../../assets/football/Team_profile_picture/西班牙.webp" alt="西班牙斗牛士传球手">
          </span>
          <span class="team-name">西班牙</span>
          <span class="team-role">7.4万人助威</span>
        </button>
        <button class="team-card" aria-label="查看日本球队详情" data-team="japan">
          <span class="team-avatar" style="--team-from:#0033a0;--team-to:#bc002d">
            <img src="../../assets/football/Team_profile_picture/日本.webp" alt="日本蓝武士">
          </span>
          <span class="team-name">日本</span>
          <span class="team-role">6.5万人助威</span>
        </button>
        <button class="team-card" aria-label="查看韩国球队详情" data-team="korea">
          <span class="team-avatar" style="--team-from:#c60c30;--team-to:#003478">
            <img src="../../assets/football/Team_profile_picture/韩国.webp" alt="韩国高速边锋">
          </span>
          <span class="team-name">韩国</span>
          <span class="team-role">5.9万人助威</span>
        </button>
    </div>
  </section>

  <section class="prize-showcase" aria-labelledby="prize-title">
    <img id="prize-title" class="section-title-art section-title-art--prize" src="../../assets/football/home/prize-showcase-title-figma.webp" alt="奖品展示">
    <div class="prize-scroll">
        <button class="prize-showcase-item prize-showcase-item--vip" aria-label="查看叫叫口算VIP月卡奖品预览">
          <span class="prize-showcase-art"><img src="../../assets/football/prize-vip-card.webp" alt=""></span>
          <strong>叫叫口算<br>VIP月卡</strong>
          <span>月卡激活码</span>
        </button>
        <button class="prize-showcase-item prize-showcase-item--trial" aria-label="查看体验包随心选奖品预览">
          <span class="prize-showcase-art"><img src="../../assets/football/prize-trial-card.webp" alt=""></span>
          <strong>体验包<br>随心选</strong>
          <span>多学科体验权益</span>
        </button>
        <button class="prize-showcase-item prize-showcase-item--gold" aria-label="查看叫叫金片奖品预览">
          <span class="prize-showcase-art"><img src="../../assets/football/prize-gold-card.webp" alt=""></span>
          <strong>叫叫<br>金片</strong>
          <span>实物好礼</span>
        </button>
        <button class="prize-showcase-item prize-showcase-item--plush" aria-label="查看足球冠军叫叫公仔奖品预览">
          <span class="prize-showcase-art"><img src="../../assets/football/prize-plush-card.webp" alt=""></span>
          <strong>足球冠军<br>叫叫公仔</strong>
          <span>限定周边好礼</span>
        </button>
        <button class="prize-showcase-item prize-showcase-item--skin" aria-label="查看叫叫冠军皮肤装扮奖品预览">
          <span class="prize-showcase-art"><img src="../../assets/football/champion-skin-card.webp" alt=""></span>
          <strong>叫叫冠军<br>皮肤装扮</strong>
          <span>完课助威可得</span>
        </button>
    </div>
  </section>

  <section class="bottom-share" aria-labelledby="share-title">
    <img id="share-title" src="../../assets/football/home/share-title-figma.webp" alt="分享活动，邀请好友一起助威">
    <div class="share-actions">
      <button class="share-button share-button--friend" type="button">分享给好友</button>
      <button class="share-button share-button--moments" type="button">分享到朋友圈</button>
    </div>
  </section>
</main>
