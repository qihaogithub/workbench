<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>拼字正确</title>
  <link rel="stylesheet" href="prototype.css">
</head>
<body>
  <div class="page">
    <!-- 顶部状态 -->
    <div class="top-bar">
      <div class="level-progress">
        <div class="progress-label">第 <span class="current-level">3</span>/5 关</div>
        <div class="progress-track">
          <div class="progress-fill" style="width:60%"></div>
        </div>
      </div>
    </div>

    <!-- 成功主视觉 -->
    <div class="pass-hero">
      <div class="pass-word">马</div>
      <div class="pass-label">✧ 拼字正确 ✧</div>
    </div>

    <!-- 用时信息 -->
    <div class="pass-info">
      <div class="info-card">
        <div class="info-label">本关用时</div>
        <div class="info-value">6<span class="info-unit">.5</span> 秒</div>
      </div>
      <div class="info-card">
        <div class="info-label">累计得分</div>
        <div class="info-value">240<span class="info-unit"> 分</span></div>
      </div>
    </div>

    <!-- 按钮 -->
    <div class="pass-actions">
      <button class="btn-next">
        <span>下一关</span>
        <span class="btn-arrow">→</span>
      </button>
      <button class="btn-replay">重玩本关</button>
    </div>

    <!-- 底部提示 -->
    <div class="pass-footer">
      <p>还剩 2 关，继续加油！</p>
    </div>
  </div>
</body>
</html>
