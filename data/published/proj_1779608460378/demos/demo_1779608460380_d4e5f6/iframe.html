<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://esm.sh" crossorigin>
  <link rel="dns-prefetch" href="https://esm.sh">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.5; background-color: #ffffff; }
    #root { min-height: 100vh; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1/client",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react/jsx-dev-runtime": "https://esm.sh/react@18.3.1/jsx-dev-runtime"
    }
  }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/tailwindcss-cdn@3.4.10/tailwindcss.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React from 'https://esm.sh/react@18.3.1';
    import ReactDOM from 'https://esm.sh/react-dom@18.3.1/client';

    let currentRoot = null;
    let currentConfig = {"bigBannerForeground":"https://uiweb.oss-cn-chengdu.aliyuncs.com/img/广场页/大banner/banner_前景图.png","bigBannerBackground":"https://uiweb.oss-cn-chengdu.aliyuncs.com/img/广场页/大banner/banner_背景图.png","miniBanners":["https://uiweb.oss-cn-chengdu.aliyuncs.com/img/广场页/小banner/Property%201%3D01.png","https://uiweb.oss-cn-chengdu.aliyuncs.com/img/广场页/小banner/Property%201%3D02.png","https://uiweb.oss-cn-chengdu.aliyuncs.com/img/广场页/小banner/Property%201%3D05.png","https://uiweb.oss-cn-chengdu.aliyuncs.com/img/广场页/小banner/Property%201%3D04.png","https://uiweb.oss-cn-chengdu.aliyuncs.com/img/广场页/小banner/Property%201%3D06.png"]};
    let currentComponent = null;
    let updateVersion = 0;

    window.__DEMO_PROPS__ = currentConfig;

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        window.parent.postMessage({ type: 'RUNTIME_ERROR', error: error.message, stack: error.stack }, '*');
      }

      render() {
        if (this.state.hasError) {
          return React.createElement('div', {
            style: {
              padding: '16px',
              background: '#fef2f2',
              border: '1px solid #fecaca',
              borderRadius: '8px',
              fontFamily: 'system-ui, sans-serif'
            }
          },
            React.createElement('p', { style: { color: '#991b1b', fontWeight: 500, margin: '0 0 4px 0' } }, '渲染出错'),
            React.createElement('pre', {
              style: {
                color: '#dc2626',
                fontSize: '13px',
                margin: 0,
                whiteSpace: 'pre-wrap',
                wordBreak: 'break-word'
              }
            }, this.state.error?.message || '组件运行时发生错误')
          );
        }
        return this.props.children;
      }
    }

    function renderComponent() {
      if (!currentComponent) return;
      const container = document.getElementById('root');
      if (!container) return;
      if (!currentRoot) {
        currentRoot = ReactDOM.createRoot(container);
      }
      currentRoot.render(
        React.createElement(ErrorBoundary, null,
          React.createElement(currentComponent, currentConfig)
        )
      );
    }

    function updateCssLinks(cssUrls) {
      document.querySelectorAll('link[data-dynamic-css]').forEach(el => el.remove());
      cssUrls.forEach(url => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = url.startsWith('http') ? url : 'https://esm.sh/' + url;
        link.setAttribute('data-dynamic-css', 'true');
        document.head.appendChild(link);
      });
    }

    
    function loadModuleFromCode(code, thisVersion) {
      const blob = new Blob([code], { type: 'application/javascript' });
      const moduleUrl = URL.createObjectURL(blob);
      import(moduleUrl)
        .then((module) => {
          if (thisVersion !== updateVersion) return;
          currentComponent = module.default || null;
          renderComponent();
          URL.revokeObjectURL(moduleUrl);
          if (module.default) {
            window.parent.postMessage({ type: 'LOADED' }, '*');
          } else {
            window.parent.postMessage({ type: 'RUNTIME_ERROR', error: '模块没有默认导出（export default）' }, '*');
          }
        })
        .catch((err) => {
          if (thisVersion !== updateVersion) return;
          window.parent.postMessage({ type: 'RUNTIME_ERROR', error: err.message, stack: err.stack }, '*');
        });
    }

    window.addEventListener('message', (event) => {
      if (event.source !== window.parent) return;

      const { type, code, configData: newConfigData, cssImports: newCssImports, isUrl } = event.data;

      
      if (type === 'UPDATE_CODE') {
        currentConfig = newConfigData || {};
        window.__DEMO_PROPS__ = currentConfig;
        updateCssLinks(newCssImports || []);

        const thisVersion = ++updateVersion;

        if (isUrl) {
          fetch(code)
            .then(res => {
              if (!res.ok) throw new Error('加载预编译代码失败: ' + res.status);
              return res.text();
            })
            .then(jsCode => {
              if (thisVersion !== updateVersion) return;
              loadModuleFromCode(jsCode, thisVersion);
            })
            .catch((err) => {
              if (thisVersion !== updateVersion) return;
              window.parent.postMessage({ type: 'RUNTIME_ERROR', error: err.message }, '*');
            });
        } else {
          loadModuleFromCode(code, thisVersion);
        }
      }

      if (type === 'UPDATE_CONFIG') {
        currentConfig = newConfigData || {};
        window.__DEMO_PROPS__ = currentConfig;
        if (currentComponent) {
          renderComponent();
        }
      }
    });

    const resizeObserver = new ResizeObserver((entries) => {
      for (const entry of entries) {
        const height = entry.contentRect.height;
        window.parent.postMessage({ type: 'RESIZE', height }, '*');
      }
    });
    resizeObserver.observe(document.body);

    window.addEventListener('error', (event) => {
      window.parent.postMessage({
        type: 'RUNTIME_ERROR',
        error: event.message,
        source: event.filename,
        line: event.lineno
      }, '*');
    });

    window.addEventListener('unhandledrejection', (event) => {
      window.parent.postMessage({
        type: 'RUNTIME_ERROR',
        error: event.reason?.message || String(event.reason)
      }, '*');
    });

    window.parent.postMessage({ type: 'READY' }, '*');

    const initialCode = "import {jsxs as _jsxs, jsx as _jsx} from 'https://esm.sh/react@18.3.1/jsx-runtime';\n\n\n\nexport default function PadSquare(props) {\n  const {\n    bigBannerForeground = 'https://uiweb.oss-cn-chengdu.aliyuncs.com/img/广场页/大banner/banner_前景图.png',\n  } = props;\n\n  return (\n    _jsxs('div', {\n      className: \"w-[1024px] h-[768px] relative bg-white overflow-hidden\"    ,\n      style: {\n        fontFamily: '-apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif',\n      },\n children: [\n      _jsx('style', { children: `\n        .figma-scrollbar-hide {\n          -ms-overflow-style: none;\n          scrollbar-width: none;\n        }\n        .figma-scrollbar-hide::-webkit-scrollbar {\n          display: none;\n          width: 0;\n          height: 0;\n        }\n      `})\n\n      /* 顶部状态栏 */\n      , _jsx('img', {\n        src: \"https://r2-asset-worker.qihaogo.workers.dev/figma/h_569f7368.png\",\n        alt: \"status bar\" ,\n        className: \"left-0 top-0 absolute object-cover max-w-none\"    ,\n        style: { width: 1023, height: 58 },}\n      )\n\n      /* 内容区域 */\n      , _jsxs('div', { className: \"w-[1023.10px] px-[36.15px] left-0 top-[57.84px] absolute inline-flex flex-col justify-start items-start gap-5\"         , children: [\n\n        /* 科目选择 - 参考设计图 */\n        _jsx('img', {\n          src: \"https://r2-asset-worker.qihaogo.workers.dev/figma/h_b2570ead.png\",\n          alt: \"subjects\",\n          className: \"object-cover max-w-none\" ,\n          style: { width: 951, height: 54 },}\n        )\n\n        /* 大Banner - 使用项目级配置的前景图 */\n        , _jsxs('div', { className: \"w-[950px] h-[291.93px] shrink-0 relative overflow-hidden\"    , children: [\n          _jsx('div', { className: \"w-[951.82px] h-[261.52px] left-[-1.22px] top-[30.41px] absolute bg-gradient-to-b from-[#ffd5ec] to-[#fceef6] rounded-3xl overflow-hidden\"         , children: \n            _jsx('img', {\n              className: \"w-[948.78px] h-[265.17px] left-[1.22px] top-[-3.65px] absolute max-w-none\"     ,\n              src: \"https://r2-asset-worker.qihaogo.workers.dev/figma/h_df5192e8.png\",\n              alt: \"banner-bg-deco\",\n              style: { width: 949, height: 265 },}\n            )\n          })\n          , _jsx('img', {\n            className: \"w-[948.78px] h-[291.93px] left-[1.40px] top-[0.38px] absolute max-w-none\"     ,\n            src: bigBannerForeground,\n            alt: \"banner-fg\",\n            style: { width: 949, height: 292 },}\n          )\n        ]})\n\n        /* 横滑领课卡片 - 6张课程卡片 */\n        , _jsxs('div', { className: \"shrink-0 inline-flex justify-start items-start gap-[14.91px] overflow-x-auto figma-scrollbar-hide\"      , children: [\n          _jsx('img', {\n            className: \"w-[219.62px] h-[123.54px] shrink-0 max-w-none\"   ,\n            src: \"https://r2-asset-worker.qihaogo.workers.dev/figma/h_526b8a8b.png\",\n            alt: \"course-card-1\",\n            style: { width: 220, height: 124 },}\n          )\n          , _jsx('img', {\n            className: \"w-[219.62px] h-[123.54px] shrink-0 max-w-none\"   ,\n            src: \"https://r2-asset-worker.qihaogo.workers.dev/figma/h_71cc80a5.png\",\n            alt: \"course-card-2\",\n            style: { width: 220, height: 124 },}\n          )\n          , _jsx('img', {\n            className: \"w-[219.62px] h-[123.54px] shrink-0 max-w-none\"   ,\n            src: \"https://r2-asset-worker.qihaogo.workers.dev/figma/h_b9ff3ad5.png\",\n            alt: \"course-card-3\",\n            style: { width: 220, height: 124 },}\n          )\n          , _jsx('img', {\n            className: \"w-[219.62px] h-[123.54px] shrink-0 max-w-none\"   ,\n            src: \"https://r2-asset-worker.qihaogo.workers.dev/figma/h_c7fa7da1.png\",\n            alt: \"course-card-4\",\n            style: { width: 220, height: 124 },}\n          )\n          , _jsx('img', {\n            className: \"w-[219.62px] h-[123.54px] shrink-0 max-w-none\"   ,\n            src: \"https://r2-asset-worker.qihaogo.workers.dev/figma/h_744e2e57.png\",\n            alt: \"course-card-5\",\n            style: { width: 220, height: 124 },}\n          )\n          , _jsx('img', {\n            className: \"w-[219.62px] h-[123.54px] shrink-0 max-w-none\"   ,\n            src: \"https://r2-asset-worker.qihaogo.workers.dev/figma/h_8946e15c.png\",\n            alt: \"course-card-6\",\n            style: { width: 220, height: 124 },}\n          )\n        ]})\n\n        /* 底部课程卡片区 */\n        , _jsx('img', {\n          src: \"https://r2-asset-worker.qihaogo.workers.dev/figma/h_c925e908.png\",\n          alt: \"course-section\",\n          className: \"relative object-cover max-w-none\"  ,\n          style: { width: 951, height: 228 },}\n        )\n      ]})\n\n      /* 底部标签栏 */\n      , _jsx('img', {\n        src: \"https://r2-asset-worker.qihaogo.workers.dev/figma/h_ccadf0df.png\",\n        alt: \"tabBar\",\n        className: \"left-0 top-[706px] absolute object-cover max-w-none\"    ,\n        style: { width: 1024, height: 62 },}\n      )\n    ]})\n  );\n}";
    if (initialCode) {
      window.__DEMO_PROPS__ = currentConfig;
      const blob = new Blob([initialCode], { type: 'application/javascript' });
      const moduleUrl = URL.createObjectURL(blob);
      import(moduleUrl)
        .then((module) => {
          currentComponent = module.default;
          renderComponent();
          URL.revokeObjectURL(moduleUrl);
        })
        .catch((err) => {
          window.parent.postMessage({ type: 'RUNTIME_ERROR', error: err.message }, '*');
        });
    }
  </script>
</body>
