services:
  agent-service:
    build:
      context: .
      dockerfile: docker/agent-service/Dockerfile
    ports:
      - "3201:3201"
    environment:
      - PORT=3201
      - HOST=0.0.0.0
      - PI_AGENT_PROVIDER=${PI_AGENT_PROVIDER:-anthropic}
      - PI_AGENT_API_KEY=${PI_AGENT_API_KEY:-}
      - PI_AGENT_MODEL=${PI_AGENT_MODEL:-claude-sonnet-4-20250514}
      - PI_AGENT_BASE_URL=${PI_AGENT_BASE_URL:-}
      - PI_AGENT_TIMEOUT=${PI_AGENT_TIMEOUT:-120000}
      - PI_AGENT_PROVIDERS=${PI_AGENT_PROVIDERS:-}
      - PI_AGENT_SUBAGENTS_ENABLED=${PI_AGENT_SUBAGENTS_ENABLED:-true}
      - PI_AGENT_SUBAGENT_TIMEOUT=${PI_AGENT_SUBAGENT_TIMEOUT:-120000}
      - PI_AGENT_WEB_READ_ENABLED=${PI_AGENT_WEB_READ_ENABLED:-true}
      - PI_AGENT_WEB_READ_TIMEOUT_MS=${PI_AGENT_WEB_READ_TIMEOUT_MS:-10000}
      - PI_AGENT_WEB_READ_MAX_BYTES=${PI_AGENT_WEB_READ_MAX_BYTES:-1000000}
      - PI_AGENT_WEB_SEARCH_ENABLED=${PI_AGENT_WEB_SEARCH_ENABLED:-false}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - PI_AGENT_WEB_SEARCH_TIMEOUT_MS=${PI_AGENT_WEB_SEARCH_TIMEOUT_MS:-10000}
      - PI_AGENT_WEB_SEARCH_CACHE_TTL_MS=${PI_AGENT_WEB_SEARCH_CACHE_TTL_MS:-600000}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3200,http://localhost:3300}
      - DATA_DIR=/app/data
      - SCREENSHOT_SERVICE_URL=http://screenshot-service:3202
      - NEXT_PUBLIC_DEFAULT_MODEL_IDS=${NEXT_PUBLIC_DEFAULT_MODEL_IDS:-}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-}
    volumes:
      - app-data:/app/data
    cpus: "1.0"
    mem_limit: 1g
    pids_limit: 512
    restart: unless-stopped

  author-site:
    build:
      context: .
      dockerfile: docker/author-site/Dockerfile
      args:
        - NEXT_PUBLIC_ALLOWED_MODEL_PREFIXES=${NEXT_PUBLIC_ALLOWED_MODEL_PREFIXES:-custom/}
        - NEXT_PUBLIC_MODEL_BLACKLIST=${NEXT_PUBLIC_MODEL_BLACKLIST:-}
        - NEXT_PUBLIC_DEFAULT_MODEL_IDS=${NEXT_PUBLIC_DEFAULT_MODEL_IDS:-}
        - NEXT_PUBLIC_MODEL_NAME_FILTERS=${NEXT_PUBLIC_MODEL_NAME_FILTERS:-}
        - NEXT_PUBLIC_AGENT_SERVICE_URL=${NEXT_PUBLIC_AGENT_SERVICE_URL:-http://localhost:3201}
        - NEXT_PUBLIC_SCREENSHOT_SERVICE_URL=${NEXT_PUBLIC_SCREENSHOT_SERVICE_URL:-http://localhost:3202}
    ports:
      - "3200:3200"
    environment:
      - PORT=3200
      - HOSTNAME=0.0.0.0
      - AGENT_SERVICE_URL=http://agent-service:3201
      - NEXT_PUBLIC_AGENT_SERVICE_URL=${NEXT_PUBLIC_AGENT_SERVICE_URL:-http://localhost:3201}
      - SCREENSHOT_SERVICE_URL=http://screenshot-service:3202
      - NEXT_PUBLIC_ALLOWED_MODEL_PREFIXES=${NEXT_PUBLIC_ALLOWED_MODEL_PREFIXES:-custom/}
      - NEXT_PUBLIC_MODEL_BLACKLIST=${NEXT_PUBLIC_MODEL_BLACKLIST:-}
      - NEXT_PUBLIC_DEFAULT_MODEL_IDS=${NEXT_PUBLIC_DEFAULT_MODEL_IDS:-}
      - NEXT_PUBLIC_MODEL_NAME_FILTERS=${NEXT_PUBLIC_MODEL_NAME_FILTERS:-}
      - NEXT_PUBLIC_SCREENSHOT_SERVICE_URL=${NEXT_PUBLIC_SCREENSHOT_SERVICE_URL:-http://localhost:3202}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - USE_SECURE_COOKIE=${USE_SECURE_COOKIE:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3200,http://localhost:3300}
      - DATA_DIR=/app/data
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-}
      - ADMIN_SECRET=${ADMIN_SECRET:-}
    volumes:
      - app-data:/app/data
    depends_on:
      - agent-service
    cpus: "1.0"
    mem_limit: 1g
    pids_limit: 512
    restart: unless-stopped

  screenshot-service:
    build:
      context: .
      dockerfile: docker/screenshot-service/Dockerfile
    ports:
      - "3202:3202"
    environment:
      - PORT=3202
      - HOST=0.0.0.0
      - AUTHOR_SITE_URL=http://author-site:3200
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - DATA_DIR=/app/data
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3200,http://localhost:3300}
    volumes:
      - app-data:/app/data
    depends_on:
      - author-site
    cpus: "1.0"
    mem_limit: 1536m
    pids_limit: 768
    shm_size: 256m
    restart: unless-stopped

  viewer-site:
    build:
      context: .
      dockerfile: docker/viewer-site/Dockerfile
      args:
        - NEXT_PUBLIC_AGENT_SERVICE_URL=${NEXT_PUBLIC_AGENT_SERVICE_URL:-http://localhost:3201}
        - NEXT_PUBLIC_DATA_BASE=${NEXT_PUBLIC_DATA_BASE:-}
    ports:
      - "3300:80"
    volumes:
      - app-data:/app/data:ro
    depends_on:
      - author-site
    cpus: "0.5"
    mem_limit: 512m
    pids_limit: 256
    restart: unless-stopped

volumes:
  app-data:
