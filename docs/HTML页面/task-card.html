<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学习页任务卡片 - 可视化编辑器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        overflow: hidden;
      }

      .device-mockup {
        position: relative;
        background: #fff;
        border: 12px solid #1f2937;
        border-radius: 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        overflow: hidden;
        flex-shrink: 0;
      }

      .device-mockup.phone {
        width: 375px;
        height: 812px;
      }

      .device-mockup.phone.phone-compact {
        height: 720px;
      }

      .device-mockup.pad {
        width: 1024px;
        height: 812px;
        border-width: 16px;
        border-radius: 24px;
      }

      .screen-container {
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: relative;
        background-color: #fff;
        display: flex;
        flex-direction: column;
      }

      .nav-status-container {
        width: 100%;
      }

      .nav-status-container img {
        width: 100%;
        height: auto;
      }

      .task-card-content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 89.333%;
        margin: 0 auto;
      }

      .task-card {
        width: 100%;
        border-radius: 1.5rem;
        background: #fff3eb;
        padding: 10px;
      }

      .task-card-auxiliary {
        color: #e35b00;
        margin: 0.3rem 0 0.5rem 0.375rem;
        font-size: 0.75rem;
      }

      .task-card-white {
        background: white;
        border-radius: 1rem;
        overflow: hidden;
      }

      .task-card-image {
        width: 100%;
        display: block;
      }

      .task-card-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 2.5rem;
        padding: 0 0.5rem;
      }

      .task-card-title {
        font-size: 0.8rem;
        color: #6b2d03;
      }

      .task-card-btn {
        background: #fcda00;
        color: #6b430b;
        font-size: 0.8rem;
        border-radius: 1.5625rem;
        padding: 0.25rem 0.75rem;
        border: none;
        cursor: pointer;
        white-space: nowrap;
      }

      .bottom-tab-container {
        width: 100%;
      }

      .bottom-tab-container img {
        width: 100%;
        height: auto;
      }

      .preview-wrapper {
        background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
        background-size: 20px 20px;
        overflow: hidden;
      }

      #presentation-stage {
        transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        transform-origin: center center;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 40px;
      }

      #config-sidebar {
        transition: width 0.3s ease, transform 0.3s ease;
      }

      .toggle-btn {
        position: absolute;
        left: -24px;
        top: 50%;
        transform: translateY(-50%);
        width: 24px;
        height: 48px;
        background: white;
        border: 1px solid #e5e7eb;
        border-right: none;
        border-radius: 8px 0 0 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: -2px 0 8px rgba(0, 0, 0, 0.05);
        z-index: 50;
      }

      .sidebar-collapsed {
        width: 0 !important;
        border: none;
      }

      .sidebar-collapsed .sidebar-content {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="bg-base-200 h-screen flex w-full">
    <main
      class="flex-1 h-full flex flex-col bg-slate-100 relative overflow-hidden order-1"
    >
      <div
        class="absolute top-6 left-1/2 -translate-x-1/2 z-50 bg-white/90 backdrop-blur p-1.5 rounded-full shadow-lg border border-white/50 flex gap-1"
      >
        <button
          class="btn btn-sm btn-ghost rounded-full px-5 data-[active=true]:bg-gray-900 data-[active=true]:text-white transition-all"
          id="btn-view-compare"
          onclick="switchView('compare')"
          data-active="true"
        >
          <i class="fa-solid fa-table-columns"></i> 对比
        </button>
        <button
          class="btn btn-sm btn-ghost rounded-full px-5 data-[active=true]:bg-gray-900 data-[active=true]:text-white transition-all"
          id="btn-view-phone"
          onclick="switchView('phone')"
          data-active="false"
        >
          <i class="fa-solid fa-mobile-screen"></i> 手机
        </button>
        <button
          class="btn btn-sm btn-ghost rounded-full px-5 data-[active=true]:bg-gray-900 data-[active=true]:text-white transition-all"
          id="btn-view-pad"
          onclick="switchView('pad')"
          data-active="false"
        >
          <i class="fa-solid fa-tablet-screen-button"></i> 平板
        </button>
      </div>

      <div
        class="w-full h-full flex items-center justify-center preview-wrapper relative"
        id="preview-container"
      >
        <div id="presentation-stage">
          <div id="phone-mockup-wrapper" class="device-mockup phone">
            <div class="screen-container">
              <div class="nav-status-container">
                <img
                  src="https://uiweb.oss-cn-chengdu.aliyuncs.com/img/%E5%AD%A6%E4%B9%A0%E9%A1%B5/top.png"
                />
              </div>

              <div class="task-card-content">
                <div class="task-card">
                  <div
                    class="task-card-auxiliary"
                    id="phone-auxiliary-text"
                  >这里是辅助文案</div>
                  <div class="task-card-white">
                    <img
                      class="task-card-image"
                      id="phone-card-image"
                      src="https://uiweb.oss-cn-chengdu.aliyuncs.com/img/%E5%AD%A6%E4%B9%A0%E9%A1%B5/%E9%85%8D%E5%9B%BE-%E6%89%8B%E6%9C%BA.png"
                    />
                    <div class="task-card-title-row">
                      <div
                        class="task-card-title"
                        id="phone-card-title"
                      >这里是活动标题</div>
                      <button
                        class="task-card-btn"
                        id="phone-card-btn"
                      >立即参与</button>
                    </div>
                  </div>
                </div>
              </div>

              <div class="bottom-tab-container">
                <img
                  src="https://uiweb.oss-cn-chengdu.aliyuncs.com/img/%E5%AD%A6%E4%B9%A0%E9%A1%B5/%E5%BA%95%E9%83%A8%E6%A0%87%E7%AD%BE%E6%A0%8F.png"
                />
              </div>
            </div>
          </div>

          <div id="pad-mockup-wrapper" class="device-mockup pad">
            <div class="screen-container">
              <div class="nav-status-container">
                <img
                  src="https://uiweb.oss-cn-chengdu.aliyuncs.com/img/%E5%AD%A6%E4%B9%A0%E9%A1%B5/top-pad.png"
                />
              </div>

              <div class="task-card-content">
                <div class="task-card">
                  <div
                    class="task-card-auxiliary"
                    id="pad-auxiliary-text"
                  >这里是辅助文案</div>
                  <div class="task-card-white">
                    <img
                      class="task-card-image"
                      id="pad-card-image"
                      src="https://uiweb.oss-cn-chengdu.aliyuncs.com/img/%E5%AD%A6%E4%B9%A0%E9%A1%B5/%E9%85%8D%E5%9B%BE-pad.png"
                    />
                    <div class="task-card-title-row">
                      <div
                        class="task-card-title"
                        id="pad-card-title"
                      >这里是活动标题</div>
                      <button
                        class="task-card-btn"
                        id="pad-card-btn"
                      >立即参与</button>
                    </div>
                  </div>
                </div>
              </div>

              <div class="bottom-tab-container">
                <img
                  src="https://uiweb.oss-cn-chengdu.aliyuncs.com/img/%E5%AD%A6%E4%B9%A0%E9%A1%B5/%E5%BA%95%E9%83%A8%E6%A0%87%E7%AD%BE%E6%A0%8F-pad.png"
                />
              </div>
            </div>
          </div>
        </div>
      </div>

      <div
        class="absolute bottom-4 right-4 text-xs text-gray-400 bg-white/80 px-2 py-1 rounded backdrop-blur"
      >
        Zoom: <span id="scale-val">100%</span>
      </div>
    </main>

    <aside
      id="config-sidebar"
      class="w-[380px] bg-base-100 h-full flex flex-col border-l border-base-300 shadow-xl z-20 relative order-2"
    >
      <div
        class="toggle-btn text-gray-500 hover:text-primary"
        onclick="toggleSidebar()"
      >
        <i class="fa-solid fa-chevron-right" id="toggle-icon"></i>
      </div>

      <div
        class="sidebar-content flex flex-col h-full w-[380px] transition-opacity duration-200"
      >
        <div class="p-5 border-b border-base-200 bg-white shrink-0">
          <div class="flex items-center gap-2">
            <h1 class="text-lg font-bold text-gray-800">学习页任务卡片配置</h1>
          </div>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-8">
          <div class="space-y-3">
            <h3
              class="text-sm font-bold uppercase text-gray-400 tracking-wider flex items-center gap-2"
            >
              <i class="fa-solid fa-mobile-screen"></i> 手机端配图
            </h3>
            <div
              class="bg-base-200 rounded-xl p-4 border border-base-300 border-dashed hover:border-primary transition-colors relative group"
            >
              <input
                type="file"
                class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                accept="image/*"
                id="phone-image-input"
              />
              <div class="text-center" id="phone-upload-placeholder">
                <div
                  class="w-12 h-12 bg-white rounded-full flex items-center justify-center mx-auto mb-2 shadow-sm group-hover:scale-110 transition-transform text-primary"
                >
                  <i class="fa-solid fa-cloud-arrow-up text-xl"></i>
                </div>
                <p class="text-sm font-medium text-gray-600">点击上传手机端配图</p>
                <p class="text-xs text-gray-400 mt-1">推荐尺寸: 921x519</p>
              </div>
              <div class="hidden relative z-20" id="phone-upload-preview-container">
                <img
                  id="phone-preview-resource"
                  class="w-full h-32 object-contain rounded-lg bg-white"
                />
                <button
                  onclick="clearPhoneImage(event)"
                  class="absolute -top-2 -right-2 btn btn-circle btn-xs btn-error text-white shadow-md"
                >
                  <i class="fa-solid fa-times"></i>
                </button>
              </div>
            </div>
          </div>

          <div class="space-y-3">
            <h3
              class="text-sm font-bold uppercase text-gray-400 tracking-wider flex items-center gap-2"
            >
              <i class="fa-solid fa-tablet-screen-button"></i> 平板端配图
            </h3>
            <div
              class="bg-base-200 rounded-xl p-4 border border-base-300 border-dashed hover:border-primary transition-colors relative group"
            >
              <input
                type="file"
                class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                accept="image/*"
                id="pad-image-input"
              />
              <div class="text-center" id="pad-upload-placeholder">
                <div
                  class="w-12 h-12 bg-white rounded-full flex items-center justify-center mx-auto mb-2 shadow-sm group-hover:scale-110 transition-transform text-primary"
                >
                  <i class="fa-solid fa-cloud-arrow-up text-xl"></i>
                </div>
                <p class="text-sm font-medium text-gray-600">点击上传平板端配图</p>
                <p class="text-xs text-gray-400 mt-1">推荐尺寸: 1910x519</p>
              </div>
              <div class="hidden relative z-20" id="pad-upload-preview-container">
                <img
                  id="pad-preview-resource"
                  class="w-full h-32 object-contain rounded-lg bg-white"
                />
                <button
                  onclick="clearPadImage(event)"
                  class="absolute -top-2 -right-2 btn btn-circle btn-xs btn-error text-white shadow-md"
                >
                  <i class="fa-solid fa-times"></i>
                </button>
              </div>
            </div>
          </div>

          <div class="space-y-4">
            <h3
              class="text-sm font-bold uppercase text-gray-400 tracking-wider flex items-center gap-2"
            >
              <i class="fa-solid fa-font"></i> 文案配置
            </h3>

            <div class="space-y-3">
              <div class="form-control">
                <label class="label pt-0">
                  <span class="label-text font-medium">辅助文案</span>
                </label>
                <input
                  type="text"
                  id="auxiliary-text-input"
                  class="input input-bordered focus:input-primary w-full"
                  value="这里是辅助文案"
                />
              </div>

              <div class="form-control">
                <label class="label pt-0">
                  <span class="label-text font-medium">活动标题</span>
                </label>
                <input
                  type="text"
                  id="card-title-input"
                  class="input input-bordered focus:input-primary w-full"
                  value="这里是活动标题"
                />
              </div>

              <div class="form-control">
                <label class="label pt-0">
                  <span class="label-text font-medium">按钮文案</span>
                </label>
                <input
                  type="text"
                  id="card-btn-input"
                  class="input input-bordered focus:input-primary w-full"
                  value="立即参与"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <script>
      let isSidebarOpen = true;
      function toggleSidebar() {
        const sidebar = document.getElementById("config-sidebar");
        const icon = document.getElementById("toggle-icon");

        isSidebarOpen = !isSidebarOpen;

        if (!isSidebarOpen) {
          sidebar.classList.add("sidebar-collapsed");
          icon.classList.remove("fa-chevron-right");
          icon.classList.add("fa-chevron-left");
        } else {
          sidebar.classList.remove("sidebar-collapsed");
          icon.classList.remove("fa-chevron-left");
          icon.classList.add("fa-chevron-right");
        }

        setTimeout(autoFit, 350);
      }

      let currentMode = "compare";

      function switchView(type) {
        currentMode = type;

        document.getElementById("btn-view-compare").dataset.active =
          type === "compare";
        document.getElementById("btn-view-phone").dataset.active =
          type === "phone";
        document.getElementById("btn-view-pad").dataset.active = type === "pad";

        const phoneWrapper = document.getElementById("phone-mockup-wrapper");
        const padWrapper = document.getElementById("pad-mockup-wrapper");

        if (type === "compare") {
          phoneWrapper.style.display = "block";
          padWrapper.style.display = "block";
          phoneWrapper.classList.remove("phone-compact");
        } else if (type === "phone") {
          phoneWrapper.style.display = "block";
          padWrapper.style.display = "none";
          phoneWrapper.classList.add("phone-compact");
        } else if (type === "pad") {
          phoneWrapper.style.display = "none";
          padWrapper.style.display = "block";
          phoneWrapper.classList.remove("phone-compact");
        }

        autoFit();
      }

      function autoFit() {
        const container = document.getElementById("preview-container");
        const stage = document.getElementById("presentation-stage");
        const toolbar = document.querySelector('[class*="top-6"][class*="left-1/2"]');

        stage.style.transform = "scale(1)";

        const containerRect = container.getBoundingClientRect();
        const containerW = containerRect.width - 80;
        const toolbarHeight = toolbar ? toolbar.offsetHeight + 60 : 100;
        const containerH = containerRect.height - 80 - toolbarHeight;

        let contentW = 0;
        let contentH = 0;

        const PHONE_W = 399;
        const PHONE_H = 836;
        const PHONE_COMPACT_H = 744;
        const PAD_W = 1056;
        const PAD_H = 844;
        const GAP = 40;

        if (currentMode === "compare") {
          contentW = PHONE_W + GAP + PAD_W;
          contentH = Math.max(PHONE_H, PAD_H);
        } else if (currentMode === "phone") {
          contentW = PHONE_W;
          contentH = PHONE_COMPACT_H;
        } else {
          contentW = PAD_W;
          contentH = PAD_H;
        }

        const scaleX = containerW / contentW;
        const scaleY = containerH / contentH;
        let scale = Math.min(scaleX, scaleY);

        scale = Math.min(Math.max(scale, 0.2), 1);

        stage.style.transform = `scale(${scale})`;
        document.getElementById("scale-val").innerText =
          Math.round(scale * 100) + "%";
      }

      window.addEventListener("resize", () => {
        setTimeout(autoFit, 100);
      });

      function setupPhoneImagePreview() {
        const input = document.getElementById("phone-image-input");
        const preview = document.getElementById("phone-preview-resource");
        const placeholder = document.getElementById("phone-upload-placeholder");
        const previewContainer = document.getElementById("phone-upload-preview-container");
        const phoneImg = document.getElementById("phone-card-image");

        input.addEventListener("change", function (e) {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
              const result = e.target.result;
              preview.src = result;
              phoneImg.src = result;
              placeholder.classList.add("hidden");
              previewContainer.classList.remove("hidden");
            };
            reader.readAsDataURL(file);
          }
        });
      }

      function clearPhoneImage(e) {
        e.preventDefault();
        e.stopPropagation();
        const input = document.getElementById("phone-image-input");
        const placeholder = document.getElementById("phone-upload-placeholder");
        const previewContainer = document.getElementById("phone-upload-preview-container");
        const phoneImg = document.getElementById("phone-card-image");
        const defaultSrc = "https://uiweb.oss-cn-chengdu.aliyuncs.com/img/%E5%AD%A6%E4%B9%A0%E9%A1%B5/%E9%85%8D%E5%9B%BE-%E6%89%8B%E6%9C%BA.png";

        input.value = "";
        phoneImg.src = defaultSrc;
        placeholder.classList.remove("hidden");
        previewContainer.classList.add("hidden");
      }

      function setupPadImagePreview() {
        const input = document.getElementById("pad-image-input");
        const preview = document.getElementById("pad-preview-resource");
        const placeholder = document.getElementById("pad-upload-placeholder");
        const previewContainer = document.getElementById("pad-upload-preview-container");
        const padImg = document.getElementById("pad-card-image");

        input.addEventListener("change", function (e) {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
              const result = e.target.result;
              preview.src = result;
              padImg.src = result;
              placeholder.classList.add("hidden");
              previewContainer.classList.remove("hidden");
            };
            reader.readAsDataURL(file);
          }
        });
      }

      function clearPadImage(e) {
        e.preventDefault();
        e.stopPropagation();
        const input = document.getElementById("pad-image-input");
        const placeholder = document.getElementById("pad-upload-placeholder");
        const previewContainer = document.getElementById("pad-upload-preview-container");
        const padImg = document.getElementById("pad-card-image");
        const defaultSrc = "https://uiweb.oss-cn-chengdu.aliyuncs.com/img/%E5%AD%A6%E4%B9%A0%E9%A1%B5/%E9%85%8D%E5%9B%BE-pad.png";

        input.value = "";
        padImg.src = defaultSrc;
        placeholder.classList.remove("hidden");
        previewContainer.classList.add("hidden");
      }

      function bindText(inputId, ...targetIds) {
        const input = document.getElementById(inputId);
        input.addEventListener("input", function () {
          const val = this.value;
          targetIds.forEach((id) => {
            const el = document.getElementById(id);
            if (el) el.textContent = val;
          });
        });
      }

      document.addEventListener("DOMContentLoaded", function () {
        setupPhoneImagePreview();
        setupPadImagePreview();

        bindText("auxiliary-text-input", "phone-auxiliary-text", "pad-auxiliary-text");
        bindText("card-title-input", "phone-card-title", "pad-card-title");
        bindText("card-btn-input", "phone-card-btn", "pad-card-btn");

        setTimeout(() => {
          autoFit();
        }, 100);
      });
    </script>
  </body>
</html>
