<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学习页日历扩科卡片 - 可视化编辑器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        overflow: hidden;
      }

      .device-mockup {
        position: relative;
        background: #fff;
        border: 12px solid #1f2937;
        border-radius: 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        overflow: hidden;
        flex-shrink: 0;
      }

      .device-mockup.phone {
        width: 375px;
        height: 812px;
      }

      .device-mockup.phone.phone-compact {
        height: 720px;
      }

      .device-mockup.pad {
        width: 1194px;
        height: 834px;
        border-width: 16px;
        border-radius: 24px;
      }

      .screen-container {
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: relative;
        background-color: #fff;
        display: flex;
        flex-direction: column;
      }

      .phone-content {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }

      .phone-content img {
        width: 100%;
        display: block;
      }

      .phone-kuoke-card {
        padding: 0 20px;
        width: 100%;
      }

      .phone-tab-bar {
        width: 100%;
        max-width: 375px;
        flex-shrink: 0;
      }

      .phone-tab-bar img {
        width: 100%;
        display: block;
      }

      .task-card {
        display: flex;
        justify-content: space-between;
        height: 88px;
        padding: 0 14px;
        align-items: center;
        border-radius: 24px;
        gap: 0 8px;
        background: #fff0f3;
        box-shadow: 0px -4px 10px 0px #FFE5EB inset;
      }

      .task-card .neirong {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1 0 0;
      }

      .task-card .neirong img {
        width: 60px;
        height: 60px;
        flex-shrink: 0;
      }

      .task-card .text {
        display: flex;
        flex-direction: column;
        gap: 4px;
        justify-content: center;
        height: 100%;
      }

      .task-card .title {
        color: #780a23;
        font-size: 16px;
        line-height: 1.2;
        font-weight: 600;
      }

      .task-card .subtitle {
        color: #cc2d52;
        font-size: 14px;
        font-weight: 400;
        line-height: 150%;
      }

      .task-card .participate-button {
        color: #6b430b;
        text-align: center;
        border: none;
        padding: 7px 12px;
        border-radius: 25px;
        background-color: #fcda00;
        font-size: 14px;
        font-weight: 600;
        line-height: 150%;
        cursor: pointer;
        flex-shrink: 0;
      }

      .subject-reading {
        background: #FFF3EB !important;
        box-shadow: 0px -4px 10px 0px hsla(24, 100%, 96%, 0.96) inset !important;
      }
      .subject-reading .title {
        color: #6B2D03 !important;
      }
      .subject-reading .subtitle {
        color: #E35B00 !important;
      }

      .subject-puzzle {
        background: #EBF9FF !important;
        box-shadow: 0px -4px 10px 0px hsla(198, 100%, 92%, 1) inset !important;
      }
      .subject-puzzle .title {
        color: #004161 !important;
      }
      .subject-puzzle .subtitle {
        color: #0090D9 !important;
      }

      .subject-art {
        background: #F9F5FF !important;
        box-shadow: 0px -4px 10px 0px hsla(264, 100%, 98%, 0.96) inset !important;
      }
      .subject-art .title {
        color: #452270 !important;
      }
      .subject-art .subtitle {
        color: #8D4BDE !important;
      }

      .subject-writing {
        background: #EEFCEB !important;
        box-shadow: 0px -4px 10px 0px hsla(109, 74%, 95%, 0.96) inset !important;
      }
      .subject-writing .title {
        color: #0E5200 !important;
      }
      .subject-writing .subtitle {
        color: #40A12D !important;
      }

      .subject-english {
        background: #FFF0F3 !important;
        box-shadow: 0px -4px 10px 0px hsla(348, 100%, 97%, 0.96) inset !important;
      }
      .subject-english .title {
        color: #CC2D52 !important;
      }
      .subject-english .subtitle {
        color: #780A23 !important;
      }

      .pad-status-bar {
        width: 1103px;
        margin: 0 15px;
        flex-shrink: 0;
      }

      .pad-status-bar img {
        width: 100%;
        display: block;
      }

      .pad-column {
        display: flex;
        flex-direction: column;
        width: 1133px;
        padding: 0 40px;
        flex: 1;
        overflow-y: auto;
      }

      .pad-two-columns {
        display: flex;
        justify-content: space-between;
        gap: 40px;
      }

      .pad-left-column {
        display: flex;
        flex-direction: column;
        width: 375px;
        gap: 0;
      }

      .pad-left-column img {
        width: 100%;
        display: block;
      }

      .pad-kuoke-card {
        width: 100%;
      }

      .pad-right-column {
        flex: 1;
      }

      .pad-right-column img {
        width: 100%;
        display: block;
      }

      .pad-tab-bar {
        width: 1133px;
        flex-shrink: 0;
      }

      .pad-tab-bar img {
        width: 100%;
        display: block;
      }

      .placeholder-img {
        width: 100%;
        background-color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #9ca3af;
        font-size: 14px;
      }

      .preview-wrapper {
        background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
        background-size: 20px 20px;
        overflow: hidden;
      }

      #presentation-stage {
        transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        transform-origin: center center;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 40px;
      }

      #config-sidebar {
        transition: width 0.3s ease, transform 0.3s ease;
      }

      .toggle-btn {
        position: absolute;
        left: -24px;
        top: 50%;
        transform: translateY(-50%);
        width: 24px;
        height: 48px;
        background: white;
        border: 1px solid #e5e7eb;
        border-right: none;
        border-radius: 8px 0 0 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: -2px 0 8px rgba(0, 0, 0, 0.05);
        z-index: 50;
      }

      .sidebar-collapsed {
        width: 0 !important;
        border: none;
      }

      .sidebar-collapsed .sidebar-content {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="bg-base-200 h-screen flex w-full">
    <main
      class="flex-1 h-full flex flex-col bg-slate-100 relative overflow-hidden order-1"
    >
      <div
        class="absolute top-6 left-1/2 -translate-x-1/2 z-50 bg-white/90 backdrop-blur p-1.5 rounded-full shadow-lg border border-white/50 flex gap-1"
      >
        <button
          class="btn btn-sm btn-ghost rounded-full px-5 data-[active=true]:bg-gray-900 data-[active=true]:text-white transition-all"
          id="btn-view-compare"
          onclick="switchView('compare')"
          data-active="true"
        >
          <i class="fa-solid fa-table-columns"></i> 对比
        </button>
        <button
          class="btn btn-sm btn-ghost rounded-full px-5 data-[active=true]:bg-gray-900 data-[active=true]:text-white transition-all"
          id="btn-view-phone"
          onclick="switchView('phone')"
          data-active="false"
        >
          <i class="fa-solid fa-mobile-screen"></i> 手机
        </button>
        <button
          class="btn btn-sm btn-ghost rounded-full px-5 data-[active=true]:bg-gray-900 data-[active=true]:text-white transition-all"
          id="btn-view-pad"
          onclick="switchView('pad')"
          data-active="false"
        >
          <i class="fa-solid fa-tablet-screen-button"></i> 平板
        </button>
      </div>

      <div
        class="w-full h-full flex items-center justify-center preview-wrapper relative"
        id="preview-container"
      >
        <div id="presentation-stage">
          <div id="phone-mockup-wrapper" class="device-mockup phone">
            <div class="screen-container">
              <div class="phone-content">
                <img
                  id="phone-top-image"
                  src="https://uiweb.oss-cn-chengdu.aliyuncs.com/img/%E5%AD%A6%E4%B9%A0%E9%A1%B5/%E6%89%A9%E7%A7%91%E5%8D%A1%E7%89%87/phone/%E9%A1%B6%E9%83%A8%E5%9B%BE%E7%89%87.png"
                />

                <div class="phone-kuoke-card">
                  <div class="task-card subject-english" id="phone-kuoke-card">
                    <div class="neirong">
                      <img
                        id="phone-kuoke-image"
                        alt="配图"
                        src="https://uiweb.oss-cn-chengdu.aliyuncs.com/img/%E5%AD%A6%E4%B9%A0%E9%A1%B5/%E6%89%A9%E7%A7%91%E5%8D%A1%E7%89%87/%E7%B4%A0%E6%9D%90%E5%9B%BE.png"
                      />
                      <div class="text">
                        <span class="title" id="phone-kuoke-title">趣味英语训练营</span>
                        <span class="subtitle" id="phone-kuoke-subtitle">沉浸体验 激发兴趣</span>
                      </div>
                    </div>
                    <button class="participate-button">立即体验</button>
                  </div>
                </div>

                <img
                  id="phone-calendar-image"
                  src="https://uiweb.oss-cn-chengdu.aliyuncs.com/img/%E5%AD%A6%E4%B9%A0%E9%A1%B5/%E6%89%A9%E7%A7%91%E5%8D%A1%E7%89%87/%E5%B1%95%E5%BC%80%26%E6%94%B6%E8%B5%B7.png"
                />
              </div>

              <div class="phone-tab-bar">
                <img
                  src="https://uiweb.oss-cn-chengdu.aliyuncs.com/img/%E5%AD%A6%E4%B9%A0%E9%A1%B5/%E5%BA%95%E9%83%A8%E6%A0%87%E7%AD%BE%E6%A0%8F.png"
                />
              </div>
            </div>
          </div>

          <div id="pad-mockup-wrapper" class="device-mockup pad">
            <div class="screen-container">
              <div class="pad-status-bar">
                <img
                  src="https://uiweb.oss-cn-chengdu.aliyuncs.com/img/%E9%80%9A%E7%94%A8/%E7%8A%B6%E6%80%81%E6%A0%8F/%E7%8A%B6%E6%80%81%E6%A0%8F-pad.png"
                />
              </div>

              <div class="pad-column">
                <div class="pad-two-columns">
                  <div class="pad-left-column">
                    <div class="placeholder-img" style="height: 200px;">左侧顶部</div>

                    <div class="pad-kuoke-card">
                      <div class="task-card subject-english" id="pad-kuoke-card">
                        <div class="neirong">
                          <img
                            id="pad-kuoke-image"
                            alt="配图"
                            src="https://uiweb.oss-cn-chengdu.aliyuncs.com/img/%E5%AD%A6%E4%B9%A0%E9%A1%B5/%E6%89%A9%E7%A7%91%E5%8D%A1%E7%89%87/%E7%B4%A0%E6%9D%90%E5%9B%BE.png"
                          />
                          <div class="text">
                            <span class="title" id="pad-kuoke-title">趣味英语训练营</span>
                            <span class="subtitle" id="pad-kuoke-subtitle">沉浸体验 激发兴趣</span>
                          </div>
                        </div>
                        <button class="participate-button">立即体验</button>
                      </div>
                    </div>

                    <div class="placeholder-img" style="height: 50px;">回到今天</div>
                  </div>

                  <div class="pad-right-column">
                    <div class="placeholder-img" style="height: 100%; min-height: 500px;">右侧内容</div>
                  </div>
                </div>
              </div>

              <div class="pad-tab-bar">
                <div class="placeholder-img" style="height: 80px;">底部标签栏</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div
        class="absolute bottom-4 right-4 text-xs text-gray-400 bg-white/80 px-2 py-1 rounded backdrop-blur"
      >
        Zoom: <span id="scale-val">100%</span>
      </div>
    </main>

    <aside
      id="config-sidebar"
      class="w-[380px] bg-base-100 h-full flex flex-col border-l border-base-300 shadow-xl z-20 relative order-2"
    >
      <div
        class="toggle-btn text-gray-500 hover:text-primary"
        onclick="toggleSidebar()"
      >
        <i class="fa-solid fa-chevron-right" id="toggle-icon"></i>
      </div>

      <div
        class="sidebar-content flex flex-col h-full w-[380px] transition-opacity duration-200"
      >
        <div class="p-5 border-b border-base-200 bg-white shrink-0">
          <div class="flex items-center gap-2">
            <h1 class="text-lg font-bold text-gray-800">学习页日历扩科卡片配置</h1>
          </div>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-8">
          <div class="space-y-3">
            <h3
              class="text-sm font-bold uppercase text-gray-400 tracking-wider flex items-center gap-2"
            >
              <i class="fa-regular fa-image"></i> 资源图
            </h3>
            <div
              class="bg-base-200 rounded-xl p-4 border border-base-300 border-dashed hover:border-primary transition-colors relative group"
            >
              <input
                type="file"
                class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                accept="image/*"
                id="resource-image"
              />
              <div class="text-center" id="resource-upload-placeholder">
                <div
                  class="w-12 h-12 bg-white rounded-full flex items-center justify-center mx-auto mb-2 shadow-sm group-hover:scale-110 transition-transform text-primary"
                >
                  <i class="fa-solid fa-cloud-arrow-up text-xl"></i>
                </div>
                <p class="text-sm font-medium text-gray-600">点击上传资源图</p>
                <p class="text-xs text-gray-400 mt-1">推荐尺寸: 180x180</p>
              </div>
              <div class="hidden relative z-20" id="resource-upload-preview-container">
                <img
                  id="resource-preview-image"
                  class="w-full h-32 object-contain rounded-lg bg-white"
                />
                <button
                  onclick="clearResourceImage(event)"
                  class="absolute -top-2 -right-2 btn btn-circle btn-xs btn-error text-white shadow-md"
                >
                  <i class="fa-solid fa-times"></i>
                </button>
              </div>
            </div>
          </div>

          <div class="space-y-4">
            <h3
              class="text-sm font-bold uppercase text-gray-400 tracking-wider flex items-center gap-2"
            >
              <i class="fa-solid fa-palette"></i> 科目主题
            </h3>

            <div class="form-control">
              <label class="label pt-0">
                <span class="label-text font-medium">选择科目</span>
              </label>
              <select
                id="subject-select"
                class="select select-bordered focus:select-primary w-full"
              >
                <option value="reading">阅读</option>
                <option value="puzzle">益智</option>
                <option value="art">美育</option>
                <option value="writing">小作家</option>
                <option value="english" selected>英语</option>
              </select>
            </div>
          </div>

          <div class="space-y-4">
            <h3
              class="text-sm font-bold uppercase text-gray-400 tracking-wider flex items-center gap-2"
            >
              <i class="fa-solid fa-font"></i> 卡片文案
            </h3>

            <div class="space-y-3">
              <div class="form-control">
                <label class="label pt-0">
                  <span class="label-text font-medium">主标题</span>
                </label>
                <input
                  type="text"
                  id="title-input"
                  class="input input-bordered focus:input-primary w-full"
                  value="趣味英语训练营"
                />
              </div>

              <div class="form-control">
                <label class="label pt-0">
                  <span class="label-text font-medium">副标题</span>
                </label>
                <input
                  type="text"
                  id="subtitle-input"
                  class="input input-bordered focus:input-primary w-full"
                  value="沉浸体验 激发兴趣"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <script>
      let isSidebarOpen = true;
      function toggleSidebar() {
        const sidebar = document.getElementById("config-sidebar");
        const icon = document.getElementById("toggle-icon");

        isSidebarOpen = !isSidebarOpen;

        if (!isSidebarOpen) {
          sidebar.classList.add("sidebar-collapsed");
          icon.classList.remove("fa-chevron-right");
          icon.classList.add("fa-chevron-left");
        } else {
          sidebar.classList.remove("sidebar-collapsed");
          icon.classList.remove("fa-chevron-left");
          icon.classList.add("fa-chevron-right");
        }

        setTimeout(autoFit, 350);
      }

      let currentMode = "compare";

      function switchView(type) {
        currentMode = type;

        document.getElementById("btn-view-compare").dataset.active =
          type === "compare";
        document.getElementById("btn-view-phone").dataset.active =
          type === "phone";
        document.getElementById("btn-view-pad").dataset.active = type === "pad";

        const phoneWrapper = document.getElementById("phone-mockup-wrapper");
        const padWrapper = document.getElementById("pad-mockup-wrapper");

        if (type === "compare") {
          phoneWrapper.style.display = "block";
          padWrapper.style.display = "block";
          phoneWrapper.classList.remove("phone-compact");
        } else if (type === "phone") {
          phoneWrapper.style.display = "block";
          padWrapper.style.display = "none";
          phoneWrapper.classList.add("phone-compact");
        } else if (type === "pad") {
          phoneWrapper.style.display = "none";
          padWrapper.style.display = "block";
          phoneWrapper.classList.remove("phone-compact");
        }

        autoFit();
      }

      function autoFit() {
        const container = document.getElementById("preview-container");
        const stage = document.getElementById("presentation-stage");
        const toolbar = document.querySelector('[class*="top-6"][class*="left-1/2"]');

        stage.style.transform = "scale(1)";

        const containerRect = container.getBoundingClientRect();
        const containerW = containerRect.width - 80;
        const toolbarHeight = toolbar ? toolbar.offsetHeight + 60 : 100;
        const containerH = containerRect.height - 80 - toolbarHeight;

        let contentW = 0;
        let contentH = 0;

        const PHONE_W = 399;
        const PHONE_H = 836;
        const PHONE_COMPACT_H = 744;
        const PAD_W = 1226;
        const PAD_H = 866;
        const GAP = 40;

        if (currentMode === "compare") {
          contentW = PHONE_W + GAP + PAD_W;
          contentH = Math.max(PHONE_H, PAD_H);
        } else if (currentMode === "phone") {
          contentW = PHONE_W;
          contentH = PHONE_COMPACT_H;
        } else {
          contentW = PAD_W;
          contentH = PAD_H;
        }

        const scaleX = containerW / contentW;
        const scaleY = containerH / contentH;
        let scale = Math.min(scaleX, scaleY);

        scale = Math.min(Math.max(scale, 0.2), 1);

        stage.style.transform = `scale(${scale})`;
        document.getElementById("scale-val").innerText =
          Math.round(scale * 100) + "%";
      }

      window.addEventListener("resize", () => {
        setTimeout(autoFit, 100);
      });

      function setupResourceImagePreview() {
        const input = document.getElementById("resource-image");
        const preview = document.getElementById("resource-preview-image");
        const placeholder = document.getElementById("resource-upload-placeholder");
        const previewContainer = document.getElementById("resource-upload-preview-container");
        const phoneImg = document.getElementById("phone-kuoke-image");
        const padImg = document.getElementById("pad-kuoke-image");

        input.addEventListener("change", function (e) {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
              const result = e.target.result;
              preview.src = result;
              phoneImg.src = result;
              padImg.src = result;

              placeholder.classList.add("hidden");
              previewContainer.classList.remove("hidden");
            };
            reader.readAsDataURL(file);
          }
        });
      }

      function clearResourceImage(e) {
        e.preventDefault();
        e.stopPropagation();
        const input = document.getElementById("resource-image");
        const placeholder = document.getElementById("resource-upload-placeholder");
        const previewContainer = document.getElementById("resource-upload-preview-container");
        const phoneImg = document.getElementById("phone-kuoke-image");
        const padImg = document.getElementById("pad-kuoke-image");
        const defaultSrc =
          "https://uiweb.oss-cn-chengdu.aliyuncs.com/img/%E5%AD%A6%E4%B9%A0%E9%A1%B5/%E6%89%A9%E7%A7%91%E5%8D%A1%E7%89%87/%E7%B4%A0%E6%9D%90%E5%9B%BE.png";

        input.value = "";
        phoneImg.src = defaultSrc;
        padImg.src = defaultSrc;
        placeholder.classList.remove("hidden");
        previewContainer.classList.add("hidden");
      }

      function bindText(inputId, ...targetIds) {
        const input = document.getElementById(inputId);
        input.addEventListener("input", function () {
          const val = this.value;
          targetIds.forEach((id) => {
            const el = document.getElementById(id);
            if (el) el.textContent = val;
          });
        });
      }

      function setupSubjectSelect() {
        const select = document.getElementById("subject-select");
        const phoneCard = document.getElementById("phone-kuoke-card");
        const padCard = document.getElementById("pad-kuoke-card");
        const subjects = ["reading", "puzzle", "art", "writing", "english"];

        select.addEventListener("change", function () {
          const subject = this.value;
          subjects.forEach((s) => {
            phoneCard.classList.remove(`subject-${s}`);
            padCard.classList.remove(`subject-${s}`);
          });
          phoneCard.classList.add(`subject-${subject}`);
          padCard.classList.add(`subject-${subject}`);
        });
      }

      document.addEventListener("DOMContentLoaded", function () {
        setupResourceImagePreview();
        setupSubjectSelect();

        bindText("title-input", "phone-kuoke-title", "pad-kuoke-title");
        bindText("subtitle-input", "phone-kuoke-subtitle", "pad-kuoke-subtitle");

        setTimeout(() => {
          autoFit();
        }, 100);
