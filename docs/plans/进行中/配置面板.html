<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配置面板重设计 - 极简版</title>
<style>
    :root {
        --bg-panel: #202020;
        --bg-body: #141414;
        --text-main: #E5E5E5;
        --text-muted: #888888;
        --border-color: #333333;
        
        /* 全局配置视觉色 */
        --global-color: #3b82f6;
        --global-bg-tint: rgba(59, 130, 246, 0.04);
        --global-border: rgba(59, 130, 246, 0.3);
        
        /* 局部配置视觉色 */
        --local-color: #10b981;
        --local-bg-tint: rgba(255, 255, 255, 0.02);
    }

    body {
        margin: 0;
        padding: 20px;
        background-color: var(--bg-body);
        color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        justify-content: flex-end; /* 模拟在右侧 */
    }

    /* 右侧面板容器 */
    .config-panel {
        width: 320px;
        background-color: var(--bg-panel);
        border-left: 1px solid var(--border-color);
        height: 90vh;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        box-shadow: -4px 0 15px rgba(0,0,0,0.2);
    }

    /* 面板头部 */
    .panel-header {
        padding: 20px 16px;
        border-bottom: 1px solid var(--border-color);
    }
    .panel-header h2 {
        margin: 0 0 4px 0;
        font-size: 16px;
        font-weight: 600;
    }
    .panel-header p {
        margin: 0;
        font-size: 12px;
        color: var(--text-muted);
    }

    /* 配置区域滚动容器 */
    .config-scroll-area {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 20px; /* 两个主要配置块的间距 */
    }

    /* --- 作用域卡片 --- */
    .scope-card {
        border-radius: 8px;
        border: 1px solid var(--border-color);
        overflow: hidden;
    }

    /* 全局卡片特有样式 */
    .scope-card.global-scope {
        border-color: var(--global-border);
        background-color: var(--global-bg-tint);
    }
    
    /* 局部卡片特有样式 */
    .scope-card.local-scope {
        background-color: var(--local-bg-tint);
    }

    /* 作用域卡片头部（去除了Tag，改为左侧居中对齐） */
    .scope-header {
        display: flex;
        align-items: center;
        padding: 12px 14px;
        background-color: rgba(0,0,0,0.2);
        border-bottom: 1px solid var(--border-color);
    }
    .scope-card.global-scope .scope-header { border-bottom-color: var(--global-border); }

    .scope-title-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .scope-title-wrap svg {
        width: 15px;
        height: 15px;
        color: var(--text-muted);
    }
    .global-scope .scope-title-wrap svg { color: var(--global-color); }
    /* 可以为页面图标加一点点高光颜色以示区分，这里保持中性偏亮 */
    .local-scope .scope-title-wrap svg { color: #d4d4d4; }
    
    .scope-title {
        font-size: 14px; /* 稍微调大一点点标题字号，增强层级 */
        font-weight: 600;
        color: var(--text-main);
    }

    /* 内部折叠面板 (智能分组) */
    .setting-group {
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .setting-group:last-child { border-bottom: none; }
    
    .setting-group summary {
        padding: 12px 14px;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-muted);
        cursor: pointer;
        user-select: none;
        display: flex;
        align-items: center;
    }
    .setting-group summary:hover { color: #fff; }
    
    /* 配置项表单布局 */
    .group-content {
        padding: 0 14px 16px 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .form-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    
    .form-label {
        font-size: 12px;
        color: var(--text-main);
        display: flex;
        align-items: center;
        gap: 4px;
    }

    /* 表单控件模拟 */
    .form-input {
        background: #1a1a1a;
        border: 1px solid #333;
        color: #fff;
        padding: 6px 8px;
        border-radius: 4px;
        font-size: 12px;
        width: 160px;
    }
    .form-input:focus {
        outline: none;
        border-color: #555;
    }

    .form-slider {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 160px;
    }
    .form-slider input[type="range"] {
        flex: 1;
        accent-color: #fff;
    }
    .form-slider span { font-size: 12px; }

    .form-toggle {
        width: 32px;
        height: 18px;
        background: #fff;
        border-radius: 10px;
        position: relative;
        cursor: pointer;
    }
    .form-toggle::after {
        content: '';
        position: absolute;
        width: 14px;
        height: 14px;
        background: #000;
        border-radius: 50%;
        top: 2px;
        right: 2px;
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
</style>
</head>
<body>

<aside class="config-panel">
    <!-- 面板头部 -->
    <header class="panel-header">
        <h2>配置面板</h2>
        <p>修改配置项，预览区将实时更新</p>
    </header>

    <div class="config-scroll-area">
        
        <!-- ================= 全局配置卡片 ================= -->
        <section class="scope-card global-scope">
            <div class="scope-header">
                <div class="scope-title-wrap">
                    <!-- 地球 图标 -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                    </svg>
                    <!-- 修改为：全局配置 -->
                    <span class="scope-title">全局配置</span>
                </div>
            </div>

            <details class="setting-group" open>
                <summary>主题与样式</summary>
                <div class="group-content">
                    <div class="form-item">
                        <span class="form-label">主题模式</span>
                        <select class="form-input" style="width: 178px;">
                            <option>深色模式 (Dark)</option>
                            <option>浅色模式 (Light)</option>
                        </select>
                    </div>
                </div>
            </details>
        </section>

        <!-- ================= 页面配置卡片 ================= -->
        <section class="scope-card local-scope">
            <div class="scope-header">
                <div class="scope-title-wrap">
                    <!-- 文档/页面 图标 -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <!-- 修改为动态页面名：手机 -->
                    <span class="scope-title">手机</span>
                </div>
            </div>

            <details class="setting-group" open>
                <summary>基础配置</summary>
                <div class="group-content">
                    <div class="form-item">
                        <span class="form-label">页面标题</span>
                        <input type="text" class="form-input" value="✨ 炫彩世界">
                    </div>
                    <div class="form-item">
                        <span class="form-label">副标题</span>
                        <input type="text" class="form-input" value="探索色彩的无限可能">
                    </div>
                    <div class="form-item">
                        <span class="form-label">卡片数量</span>
                        <div class="form-slider">
                            <input type="range" min="1" max="10" value="6">
                            <span>6</span>
                        </div>
                    </div>
                </div>
            </details>

            <details class="setting-group" open>
                <summary>显示选项</summary>
                <div class="group-content">
                    <div class="form-item">
                        <span class="form-label">启用动画效果</span>
                        <div class="form-toggle"></div>
                    </div>
                </div>
            </details>

        </section>
    </div>
</aside>

</body>
</html>
